name: DVC S3 ML Pipeline - Demo

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]==3.63.0"

      - name: DVC pull demo
        run: |
          echo "Mode démonstration : dvc pull depuis S3 serait exécuté ici"

      - name: Train model
        run: python script.py

      - name: DVC push demo
        run: |
          echo "Mode démonstration : dvc push vers S3 serait exécuté ici"

      - name: Generate report
        run: |
          echo "## Metrics" > report.md
          cat metrics.txt >> report.md
          echo "" >> report.md
          echo "## Confusion Matrix" >> report.md
          echo "![confusion matrix](./conf_matrix.png)" >> report.md

      - name: Publish CML report
        uses: iterative/setup-cml@v2
        with:
          version: latest

      - name: CML comment
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml comment create report.md